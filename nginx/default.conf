# MediChain reverse proxy — development / non-TLS.
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf.

upstream medichain_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    # Allow medical-document uploads.
    client_max_body_size 25m;

    # Server-Sent Events (GET /api/events): disable buffering and hold the
    # connection open so real-time push works through the proxy.
    location /api/events {
        proxy_pass http://medichain_api;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # All other API traffic.
    location /api/ {
        proxy_pass http://medichain_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Convenience health endpoint for load balancers.
    location = /health {
        proxy_pass http://medichain_api/api/health;
    }
}
