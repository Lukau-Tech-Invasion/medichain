<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediChain - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      padding: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    
    .offline-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .offline-icon svg {
      width: 32px;
      height: 32px;
      color: #d97706;
    }
    
    h1 { color: #1e293b; font-size: 22px; margin-bottom: 12px; }
    p { color: #64748b; font-size: 15px; line-height: 1.5; margin-bottom: 20px; }
    
    .btn {
      display: inline-block;
      background: #10b981;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    
    .btn:hover { background: #059669; }
    
    .medical-id-btn {
      display: block;
      margin-top: 16px;
      background: #dc2626;
    }
    
    .medical-id-btn:hover { background: #b91c1c; }
    
    .emergency-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }
    
    .emergency-title {
      color: #dc2626;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .emergency-numbers {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    
    .emergency-num {
      background: #fef2f2;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
    }
    
    .emergency-num-value {
      font-size: 20px;
      font-weight: bold;
      color: #dc2626;
    }
    
    .emergency-num-label {
      font-size: 12px;
      color: #6b7280;
    }
    
    .cached-notice {
      margin-top: 20px;
      padding: 12px;
      background: #ecfdf5;
      border-radius: 8px;
      font-size: 13px;
      color: #065f46;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3" />
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>Don't worry! Your Medical ID is still available for emergencies.</p>
    
    <button class="btn" onclick="location.reload()">Try Again</button>
    <a href="/medical-id" class="btn medical-id-btn">🆔 View Medical ID</a>
    
    <div class="emergency-section">
      <p class="emergency-title">🚨 Emergency?</p>
      <div class="emergency-numbers">
        <a href="tel:10177" class="emergency-num">
          <div class="emergency-num-value">10177</div>
          <div class="emergency-num-label">Ambulance</div>
        </a>
        <a href="tel:10111" class="emergency-num">
          <div class="emergency-num-value">10111</div>
          <div class="emergency-num-label">Police</div>
        </a>
      </div>
    </div>
    
    <div class="cached-notice" id="cached-notice" style="display: none;">
      ✓ Your Medical ID is saved for offline access
    </div>
  </div>
  
  <script>
    // Check if Medical ID is cached
    if (localStorage.getItem('cachedMedicalId')) {
      document.getElementById('cached-notice').style.display = 'block';
    }
    
    // Auto-retry when online
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
