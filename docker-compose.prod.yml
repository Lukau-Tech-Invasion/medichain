# =============================================================================
# MediChain — Production overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# REQUIRED before running:
#   * Set strong POSTGRES_PASSWORD, SESSION_SECRET and JWT_SECRET in .env — the
#     API aborts on startup if demo secrets are used while IS_DEMO=false.
#   * Provide TLS certificates at ./nginx/certs/{fullchain.pem,privkey.pem}
#     (e.g. from Let's Encrypt / certbot).
# =============================================================================

services:
  api:
    restart: always
    environment:
      IS_DEMO: "false"
      REQUIRE_SIGNATURES: "true"
      MEDICHAIN_STORAGE: postgres
      RUST_LOG: ${RUST_LOG:-info,sqlx=warn}
      BLOCKCHAIN_ENABLED: ${BLOCKCHAIN_ENABLED:-false}

  postgres:
    restart: always
    # Do NOT publish the database to the host in production.
    ports: []

  pgadmin:
    # pgAdmin is a development convenience — keep it off the public network.
    ports: []
    restart: "no"

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  substrate-node:
    profiles: ["blockchain", "prod"]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -H \"Content-Type: application/json\" -d '{\"id\":1, \"jsonrpc\":\"2.0\", \"method\": \"system_health\", \"params\":[]}' http://localhost:9933"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - medichain_network

  # ===========================================================================
  # Observability (OPT-IN — `docker compose ... --profile monitoring up`)
  # Prometheus scrapes the API's /api/metrics; Grafana auto-provisions the
  # bundled dashboard + datasource. Config lives in docs/observability/.
  # ===========================================================================
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v2.54.1
    container_name: medichain_prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - api
    networks:
      - medichain_network

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:11.2.0
    container_name: medichain_grafana
    restart: always
    environment:
      # DEV-friendly default; override GF_SECURITY_ADMIN_PASSWORD in .env.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./docs/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/observability/grafana-dashboard.json:/var/lib/grafana/dashboards/medichain-api.json:ro
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
    networks:
      - medichain_network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
