# MediChain Docker Compose Configuration
# PostgreSQL + pgAdmin for development and demo

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: medichain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medichain
      POSTGRES_PASSWORD: medichain_dev_2024
      POSTGRES_DB: medichain
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medichain -d medichain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medichain_network

  # =============================================================================
  # IPFS Node (Kubo)
  # API at http://localhost:5001
  # Gateway at http://localhost:8080
  # =============================================================================
  ipfs:
    image: ipfs/kubo:latest
    container_name: medichain_ipfs
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - medichain_network

  # =============================================================================
  # MediChain API
  # =============================================================================
  api:
    build: ./api
    container_name: medichain_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://medichain:medichain_dev_2024@postgres:5432/medichain
      IPFS_API_URL: http://ipfs:5001
      IPFS_GATEWAY_URL: http://ipfs:8080
    depends_on:
      postgres:
        condition: service_healthy
      ipfs:
        condition: service_started
    networks:
      - medichain_network

  # =============================================================================
  # pgAdmin - Database Administration UI
  # Access at http://localhost:5050
  # Login: admin@medichain.local / admin
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: medichain_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medichain.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medichain_network

# =============================================================================
# Volumes for Data Persistence
# =============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  ipfs_data:
    driver: local

# =============================================================================
# Network Configuration
# =============================================================================
networks:
  medichain_network:
    driver: bridge
